services:
  api:
    build:
      context: ..
      dockerfile: deployment/api.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    volumes:
      - ../data:/app/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:0.5.1
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  qdrant_storage:
  ollama_storage:

